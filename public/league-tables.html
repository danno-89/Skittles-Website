<!DOCTYPE html>
<html>
<head>
    <title>Sarnia Skittles Club - League Tables</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="tables.css">
    <link rel="stylesheet" href="tabs.css">
    <link rel="stylesheet" href="main-page.css">
    <link rel="stylesheet" href="league-tables-page.css">
    <link rel="icon" type="image/png" href="SSC%20Logo.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/SSC%20Logo.png">
    <meta name="theme-color" content="#1f2937">
</head>
<body>

<div w3-include-html="header.html"></div>

<div class="container">
  <div w3-include-html="navigation.html"></div>

  <main>
    <page-header>
        <span slot="title">League Tables</span>
        <popup-menu slot="icon" icon="select" label="Season">
            <select id="season-filter" class="form-select">
                <option value="">Select a Season</option>
            </select>
        </popup-menu>
    </page-header>
    <div class="tab-bar">
        <div class="tabs-main">
            <div id="division-tabs-container" class="tabs-main">
                <!-- Division tabs will be dynamically inserted here -->
            </div>
        </div>
    </div>

    <div class="main-grid">
        <div class="main-content">
            <div id="league-table-container">
                <!-- The league table for the selected division will be shown here -->
            </div>
        </div>

        <aside class="sidebar-right">
            <section class="content-section">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--club-yellow); margin-bottom: 1rem; padding-bottom: 0.5rem;">
                    <h2 style="border-bottom: none; margin-bottom: 0; padding-bottom: 0; font-size: 1.2rem;">Fixtures & Results</h2>
                    <a href="fixtures-results" class="btn btn-details" style="padding: 0.2rem 0.6rem; font-size: 0.8rem;">View All</a>
                </div>
                
                <div style="display: flex; flex-direction: column; gap: var(--spacing-lg);">
                    <div>
                        <h3 style="margin-top: 0; margin-bottom: 10px; color: var(--club-green); font-size: 1.1rem;">Recent Results</h3>
                        <div id="mini-results-list"></div>
                    </div>
                    <div>
                        <h3 style="margin-top: 0; margin-bottom: 10px; color: var(--club-green); font-size: 1.1rem;">Upcoming Fixtures</h3>
                        <div id="mini-fixtures-list"></div>
                    </div>
                </div>
            </section>
        </aside>
    </div>
  </main>
</div>

<div w3-include-html="footer.html"></div>

<script type="module" src="main.js"></script>
<script type="module" src="firebase.config.js"></script>
<script type="module" src="auth-manager.js"></script>
<script type="module" src="league_tables.js"></script>
<script type="module" src="mini-fixtures.js"></script>
    
</body>
</html>
