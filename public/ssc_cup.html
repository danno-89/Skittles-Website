<!DOCTYPE html>
<html>
<head>
    <title>Sarnia Skittles Club - SSC Cup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="tabs.css">
    <link rel="stylesheet" href="ssc-cup-page.css">
    <link rel="icon" type="image/png" href="SSC%20Logo.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/SSC%20Logo.png">
    <meta name="theme-color" content="#1f2937">
</head>
<body>

<div w3-include-html="header.html"></div>

<div class="container">
  <div w3-include-html="navigation.html"></div>

  <main id="ssc-cup-page">
    <page-header>
        <span slot="title">SSC Cup</span>
        <popup-menu slot="icon" icon="select" label="Season">
            <select id="season-filter" class="form-select"></select>
        </popup-menu>
    </page-header>
    
    <div class="tab-bar">
        <div class="tabs-main">
            <div id="group-tabs-container" class="tabs-main">
                <!-- Group tabs will be dynamically inserted here -->
            </div>
        </div>
    </div>

    <div id="group-container">
        <!-- The group table and fixtures for the selected group will be shown here -->
    </div>
  </main>
</div>

<div w3-include-html="footer.html"></div>

<script type="module" src="main.js"></script>
<script type="module" src="firebase.config.js"></script>
<script type="module" src="auth-manager.js"></script>
<script type="module" src="ssc_cup.js"></script>
    
</body>
</html>
